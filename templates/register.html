{% extends 'base.html' %}

{% block title %}Alumni Network System - Sign Up{% endblock %}

{% block content %}
<div class="auth-page" style="padding: 4rem 2rem;">
    <div class="glass-panel auth-card" style="max-width: 600px;">
        <div class="auth-header">
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Select your role to start registration</p>
        </div>

        <!-- Role Tabs -->
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-student" onclick="switchTab('student')">
                <i class="fas fa-user-graduate"></i> Student
            </div>
            <div class="auth-tab" id="tab-alumni" onclick="switchTab('alumni')">
                <i class="fas fa-user-tie"></i> Alumni
            </div>
            <div class="auth-tab" id="tab-admin" onclick="switchTab('admin')">
                <i class="fas fa-user-shield"></i> Admin
            </div>
        </div>

        <!-- 1. Student Registration Form -->
        <form action="{{ url_for('auth.register_student') }}" method="POST" id="form-student" class="auth-form active">
            <div class="form-group">
                <label for="student_name" class="form-label">Full Name *</label>
                <input type="text" id="student_name" name="name" class="form-input" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label for="student_reg_email" class="form-label">Email Address *</label>
                <input type="email" id="student_reg_email" name="email" class="form-input" placeholder="e.g. john@college.edu" pattern=".*@college\.edu$" title="Please use your @college.edu email address" required>
            </div>
            <div class="form-group">
                <label for="student_reg_password" class="form-label">Password *</label>
                <input type="password" id="student_reg_password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="student_grad" class="form-label">Graduation Year *</label>
                    <input type="number" id="student_grad" name="graduation_year" class="form-input" placeholder="e.g. 2027" required min="1950" max="2035">
                </div>
                <div class="form-group">
                    <label for="student_domain" class="form-label">Domain Interest</label>
                    <select id="student_domain" name="domain" class="form-select">
                        <option value="">Select Domain</option>
                        <option value="Software Development">Software Development</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Product Management">Product Management</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Finance">Finance</option>
                        <option value="Human Resources">Human Resources</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="student_skills" class="form-label">Skills (Comma Separated)</label>
                <input type="text" id="student_skills" name="skills" class="form-input" placeholder="e.g. Python, SQL, React">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                <i class="fas fa-user-plus"></i> Submit Student Registration
            </button>
        </form>

        <!-- 2. Alumni Registration Form -->
        <form action="{{ url_for('auth.register_alumni') }}" method="POST" id="form-alumni" class="auth-form">
            <div class="form-group">
                <label for="alumni_name" class="form-label">Full Name *</label>
                <input type="text" id="alumni_name" name="name" class="form-input" placeholder="e.g. Dr. Jane Smith" required>
            </div>
            <div class="form-group">
                <label for="alumni_reg_email" class="form-label">Professional Email *</label>
                <input type="email" id="alumni_reg_email" name="email" class="form-input" placeholder="e.g. jane@college.edu" pattern=".*@college\.edu$" title="Please use your @college.edu email address" required>
            </div>
            <div class="form-group">
                <label for="alumni_reg_password" class="form-label">Password *</label>
                <input type="password" id="alumni_reg_password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="alumni_company" class="form-label">Current Company</label>
                    <input type="text" id="alumni_company" name="company" class="form-input" placeholder="e.g. Microsoft">
                </div>
                <div class="form-group">
                    <label for="alumni_designation" class="form-label">Designation</label>
                    <input type="text" id="alumni_designation" name="designation" class="form-input" placeholder="e.g. Senior SWE">
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="alumni_grad" class="form-label">Graduation Year *</label>
                    <input type="number" id="alumni_grad" name="graduation_year" class="form-input" placeholder="e.g. 2020" required min="1950" max="2026">
                </div>
                <div class="form-group">
                    <label for="alumni_domain" class="form-label">Work Domain</label>
                    <select id="alumni_domain" name="domain" class="form-select">
                        <option value="">Select Domain</option>
                        <option value="Software Development">Software Development</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Product Management">Product Management</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Finance">Finance</option>
                        <option value="Human Resources">Human Resources</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="alumni_skills" class="form-label">Key Skills (Comma Separated)</label>
                <input type="text" id="alumni_skills" name="skills" class="form-input" placeholder="e.g. Java, AWS, Kubernetes">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                <i class="fas fa-user-plus"></i> Submit Alumni Registration
            </button>
        </form>

        <!-- 3. Admin Registration Form -->
        <form action="{{ url_for('auth.register_admin') }}" method="POST" id="form-admin" class="auth-form">
            <div class="form-group">
                <label for="admin_name" class="form-label">Admin Full Name *</label>
                <input type="text" id="admin_name" name="name" class="form-input" placeholder="e.g. Administrator" required>
            </div>
            <div class="form-group">
                <label for="admin_reg_email" class="form-label">Email Address *</label>
                <input type="email" id="admin_reg_email" name="email" class="form-input" placeholder="e.g. admin@alumni.com" required>
            </div>
            <div class="form-group">
                <label for="admin_reg_password" class="form-label">Password *</label>
                <input type="password" id="admin_reg_password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="admin_secret" class="form-label">Admin Invitation Code *</label>
                <input type="password" id="admin_secret" name="secret_code" class="form-input" placeholder="Enter registration passcode" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                <i class="fas fa-user-shield"></i> Register Administrator
            </button>
        </form>

        <!-- OAuth Signup Section (Hidden for Admin) -->
        <div id="oauth-section" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
            <p style="text-align: center; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem;">Or sign up with</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="{{ url_for('auth.oauth_login', provider='google') }}" class="btn btn-secondary" style="flex: 1; justify-content: center;">
                    <i class="fab fa-google"></i> Google
                </a>
            </div>
        </div>

        <!-- Helper Actions -->
        <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            <p>Already registered? <a href="{{ url_for('auth.login_view') }}" class="accent-text" style="font-weight: 700; color: var(--accent-color);">Log In Here</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function switchTab(role) {
        document.querySelectorAll(".auth-tab").forEach(tab => tab.classList.remove("active"));
        document.querySelectorAll(".auth-form").forEach(form => form.classList.remove("active"));

        document.getElementById(`tab-${role}`).classList.add("active");
        document.getElementById(`form-${role}`).classList.add("active");
        
        const oauthSection = document.getElementById('oauth-section');
        if (oauthSection) {
            oauthSection.style.display = (role === 'admin') ? 'none' : 'block';
        }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const roleParam = urlParams.get('role');
    if (roleParam && ['student', 'alumni', 'admin'].includes(roleParam)) {
        switchTab(roleParam);
    }
</script>
{% endblock %}
