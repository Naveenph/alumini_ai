{% extends 'base.html' %}

{% block title %}Admin Profile Setting - Alumni Network System{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Profile Configuration</h1>
    <p class="page-subtitle">Update your administrator details and configuration preferences.</p>
</div>

<div class="glass-panel panel-card" style="max-width: 600px; margin: 0 auto;">
    <div class="panel-header">
        <h3 class="panel-title"><i class="fas fa-user-cog"></i> Edit Credentials</h3>
    </div>
    
    <form action="{{ url_for('admin.profile') }}" method="POST" enctype="multipart/form-data">
        <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem;">
            <img src="{{ url_for('static', filename='uploads/' + admin.profile_pic) }}" alt="Profile Avatar" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent-color); margin-bottom: 1rem;">
            
            <div class="form-group" style="text-align: center; width: 100%;">
                <label for="profile_pic" class="btn btn-secondary btn-sm" style="display: inline-flex; cursor: pointer;">
                    <i class="fas fa-camera"></i> Change Photo
                </label>
                <input type="file" id="profile_pic" name="profile_pic" style="display: none;" accept="image/*">
                <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem;">Accepted formats: PNG, JPG, JPEG, GIF.</p>
            </div>
        </div>

        <div class="form-group">
            <label for="name" class="form-label">Full Name *</label>
            <input type="text" id="name" name="name" class="form-input" value="{{ admin.name }}" required>
        </div>

        <div class="form-group">
            <label for="email" class="form-label">Email Address *</label>
            <input type="email" id="email" name="email" class="form-input" value="{{ admin.email }}" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
            <i class="fas fa-save"></i> Save Changes
        </button>
    </form>
</div>

<script>
    document.getElementById('profile_pic').addEventListener('change', function(event) {
        if (event.target.files && event.target.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.querySelector('img[alt="Profile Avatar"]').src = e.target.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    });
</script>
{% endblock %}
