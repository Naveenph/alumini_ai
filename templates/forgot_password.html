{% extends 'base.html' %}

{% block title %}Alumni Network System - Recover Password{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="glass-panel auth-card">
        <div class="auth-header">
            <h2 class="auth-title">Reset Password</h2>
            <p class="auth-subtitle">Verify your email and update your password</p>
        </div>

        <form action="{{ url_for('auth.forgot_password') }}" method="POST">
            <div class="form-group">
                <label for="role" class="form-label">Select Your Role</label>
                <select id="role" name="role" class="form-select" required>
                    <option value="student">Student</option>
                    <option value="alumni">Alumni</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Registered Email</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="e.g. name@domain.com" required>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">New Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter new password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                <i class="fas fa-key"></i> Update Password
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            <p>Back to <a href="{{ url_for('auth.login_view') }}" class="accent-text" style="font-weight: 700; color: var(--accent-color);">Log In Page</a></p>
        </div>
    </div>
</div>
{% endblock %}
