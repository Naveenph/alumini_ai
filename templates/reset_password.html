{% extends 'base.html' %}
{% block title %}Reset Password - Alumni Portal{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-gray-800 rounded-lg shadow-xl p-8 border border-gray-700">
        <h2 class="text-3xl font-bold text-center text-white mb-6">Create New Password</h2>
        
        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="space-y-6">
            <div>
                <label class="block text-gray-300 mb-2">New Password</label>
                <input type="password" name="password" required 
                       class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
